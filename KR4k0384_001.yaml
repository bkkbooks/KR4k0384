body:
  text: 車頻秦書苻堅子永固武都氐人也本姓蒲祖父洪詐稱讖文改曰符言己當王應符命也世説注四苻堅母苟氏浴漳水經西門豹祠歸夜夢若有龍蛇感己遂懷孕而生堅御覽三百六十堅初生有赤光流其室及誕肩背有赤色隱起狀若篆文曰草付之祥因為苻氏世説注四御覽三百六十九又三百七十一幼有美度石虎司隸徐統名知人堅六歲時嘗戲於路統見而異焉問曰苻郎此官街小兒行戲不畏縛邪堅曰吏縛有罪不縛小兒統謂左右曰此兒有王霸相左右曰此兒狀貌甚醜而君以為相貴異何也統曰非爾等所及知也世説注四御覽三百八十二石氏亂伯父健及父雄西入關堅時年十二未有軍號健夢有天神遣使者朱衣武冠拜肩頭為龍驤將軍肩頭堅小字也健即拜為龍驤將軍以應神命世説注四書鈔御覽二百三十九後健僭帝號死子生立凶暴群臣殺之而立堅世説注四苻生壽光三年二月太白犯東井太史奏曰必有暴兵生曰星入井者必將渴耳何怪也時長安謠曰百里望空城蔚蔚何青青瞎兒不知法仰目不見星其年苻法殺生而堅代立是其應也開元占經五十堅立時有黃雲五色回繞臺觀時以景雲瑞賜民酺五日類聚九十八御覽八苻堅欲赦與王猛苻融議甘露堂悉屏左右堅親為赦文有大蒼蠅集於筆端驅而復來俄而長安街巷人相告曰官今大赦有司以聞堅驚曰禁中伙屬耳之垣事仃從泄也敕窮之咸言有一小兒衣青衣大呼於市曰官今大赦須臾不見堅歎曰其向蒼蠅乎御覽九百四十四王猛攻鄴慕容評拒猛而恆賣水與軍人衆思為亂猛因得破之類聚八御覽八百二十八苻堅建元六年四月天苑有大星色甚白占者以為太平之祥乃立望氣臺於宮左冬十一月平燕國擒慕容暐占經七十七初慕容暐在鄴居石虎宮夢虎齧其臂募人求虎殯所在女子李免告暐在東明觀下掘得之尸僵不毀暐裸而罵之曰死胡敢夢生天子鞭撻毀辱投之漳河河流迅疾終不移轉暐後為臣虎所執乃悟而悔焉苻堅以李免無狀無少長悉坑之御覽五百四十九苻堅幸太學以周官禮注無師以太常韋逞母宋氏傳其父業使生徒就宋授業焉太常居家雖流移苦寒常自負周官終不敢捨書鈔百一按北引作車胤秦書苻堅時關隴又安百姓豐樂民歌之曰長安大街兩邊種槐下走朱輪上有鸞栖類聚十九御覽九百十六建二八年五月遣少弟陽平公融鎮鄴停灞東苟太后以融少子憂甚比發三出送之垂引夜竊往內外莫知太史令魏述奏天市南門內有后妃移動之象堅檢而知之驚曰天道與人何其不遠遂重星占占經九十苻堅建元九年四月有客星出尾箕長十餘丈狀如彗而末曲或名蚩尤旗拂於東井自夏及冬不滅太史令張益孟光奏彗起尾箕尾箕燕分而掃東井東井秦分燕首尾亂於秦東胡鮮卑歷世稱燕令慕容暐父子兄弟亡處而不報聖朝職爵鱗次執權乘勢馳輪躍馬貴榮莫與為二宜小抑退除其渠帥夫蝮蛇螫手壯夫解腕玄像告兆事應無差堅不納後慕容氏遂稱王於燕地占經八十九以安車徵隱士樂陵王勸為國子祭酒苻堅徵隱士張巨和至長安賜以冠衣和以禿辭御覽七百四十苻堅時沙門竺僧朗嘗從隱士張巨和遊巨和嘗金居而朗居琨瑞大起殿舍連樓疊閣雖素飾不同並以靜外致稱水經注八建元十五年遣長樂公丕攻沒襄陽世説注四苟萇圍襄陽作飛雲梯以攻城剋之書鈔御覽三百三十六按書鈔引作車穎秦書先是苻堅建元十二年高陸縣民穿井得龜大二尺六寸背文負八封古字堅藏之太卜因而以石為池養之十六年而死取其體以問吉凶名為客龜太卜佐高虜夢客龜言我將歸江南不遇死於秦高於夢中自解曰龜三萬六千歲而終終必亡國之徵也為謝玄破於淮肥自縊新城浮圖中秦祚因即淪矣水經注十九堅平諸國之後示人以侈苻堅時有申香長十尺以上為拂蓋郎御覽三百七十七苻堅時西域獻翠鳥四頭雄雌各二以籠盛之月餘並死同上九百二十四苻堅時四夷賓服奏集關中四方種人皆奇貌異色晉人為之題目謂胡人為側鼻東夷為廣面闊額北狄為匡腳面南蠻為腫蹄方方以類名也同上三百六十三苻堅建元十八年新平縣民耕地獲玉器初有金雕者頗知圖記王猛以為左道勸堅誅之雕臨死表堅曰新平地古顓頊虛其故里有白雞閭記言此里應出古帝王寶器至是果得之御覽七百五十六苻堅建元十八年新羅國王樓寒遣使衛頭獻美女國在百濟東其人多美髮髮長丈餘御覽三百七十三又七百八十一苻堅時新羅國王樓寒遣使衛頭朝貢堅曰卿言海東之事與古不同何也答曰亦猶中國時代變革名號改易同上七百八十一苻堅使熊邈造金銀細鏤鎧金為綖以縲之初學記二十二御覽三百五十五建元十九年大興師伐晉衆號百萬水陸俱進次於項城自項城至長安連旗千里首尾不絶乃遣告晉曰已為晉君於長女城中建廣夏之室今故大舉渡江相迎克日入宅也世説注四徵處士王嘉於到獸山王嘉在東陳陽谷口鑿岸為穴而居之諸有從其學者人各一穴遂至百穴文苑彙俊四慕容重復圍鄴百姓不得復田民以桑椹為糧相噉略盡御覽九百七十三釋道安為慕容俊所掠欲投襄陽行至新野集衆議曰今遭凶年不依國主則法事難舉乃分僧衆使竺法汰詣揚州曰彼多君子上勝可投法汰遂渡江至揚土焉世説注六尚書令苻雅為人樂施乞人填門嘗曰天下物何常吾今曰富後日貧耳忽一日不施則意不泰時人為之語曰不為權翼富寧作苻雅貧御覽四百八十七苻登堅族曾孫堅死登自立皆刻兜鍪作死休字示士以必死為度故戰所向無前御覽三百五十六書鈔百二十一引作車穎秦書苻登率萬人直到姚萇營下同聲向哭哀號動地萇心惡之與其衆議亦哭相應御覽四百八十七萇以登立堅神主於軍中頻戰輒勝亦於軍中立堅神象以請福姚萇自為堅神像戰未有利軍中士衆出入並驚恐皆云畏苻主像萇嚴鼓斬之以首送苻登御覽三百九十六
